name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Build & Release
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build app bundle
        run: |
          chmod +x bundle.sh
          ./bundle.sh

      - name: Create ZIP
        run: |
          cd build
          zip -r headroom.zip headroom.app

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/headroom.zip
          generate_release_notes: true
